name: antiribet
description: Platform all-in-one untuk bisnis UMKM Indonesia
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Routing
  go_router: ^12.0.0

  # API & Networking
  dio: ^5.3.3

  # Serialization
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

  # Local Storage & DB
  shared_preferences: ^2.2.1
  flutter_secure_storage: ^9.0.0
  drift: ^2.12.0
  sqlite3_flutter_libs: ^0.5.16
  
  # UI & Utils
  google_fonts: ^6.1.0
  fl_chart: ^0.68.0
  pdf: ^3.11.1
  printing: ^5.12.0
  uuid: ^4.4.0
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.6
  freezed: ^2.4.5
  json_serializable: ^6.9.5
  drift_dev: ^2.12.0

flutter:
  uses-material-design: true
